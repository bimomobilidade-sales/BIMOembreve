<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>bimo - Conectando o Futuro</title>
    <link rel="stylesheet" href="fonts.css">
    <script src="https://kit.fontawesome.com/363a31cc5c.js" crossorigin="anonymous"></script>
</head>
<body>
    <header>
        <div class="container">
            <img src="Bimo Sem  Fundo.png" alt="Bimo" class="logo">
        </div>
    </header>
    <main class="hero">
        <h1>AGUARDE EM BREVE</h1>
        <h2>NOVIDADE NO VALE DOS SINOS <i class="fa-sharp fa-light fa-location-dot" style="color: rgb(89, 51, 37);"></i></h2>

        <p id="countdown-message" class="countdown-message">Faltam para 15/03/2026</p>

        <div id="countdown" class="countdown" aria-live="polite">
            <div class="time-box">
                <span id="days" class="time-value">00</span>
                <span class="time-label">Dias</span>
            </div>
            <div class="time-box">
                <span id="hours" class="time-value">00</span>
                <span class="time-label">Horas</span>
            </div>
            <div class="time-box">
                <span id="minutes" class="time-value">00</span>
                <span class="time-label">Minutos</span>
            </div>
            <div class="time-box">
                <span id="seconds" class="time-value">00</span>
                <span class="time-label">Segundos</span>
            </div>
        </div>

        <button>AGUARDE!</button>
    </main>

    <script>
        const dayElement = document.getElementById('days');
        const hourElement = document.getElementById('hours');
        const minuteElement = document.getElementById('minutes');
        const secondElement = document.getElementById('seconds');
        const messageElement = document.getElementById('countdown-message');

        const targetDate = new Date('2026-03-15T00:00:00');

        function pad(value) {
            return String(value).padStart(2, '0');
        }

        function updateCountdown() {
            const now = new Date();
            const diff = targetDate - now;

            if (diff <= 0) {
                dayElement.textContent = '00';
                hourElement.textContent = '00';
                minuteElement.textContent = '00';
                secondElement.textContent = '00';
                messageElement.textContent = 'Chegou o grande dia!';
                return;
            }

            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
            const minutes = Math.floor((diff / (1000 * 60)) % 60);
            const seconds = Math.floor((diff / 1000) % 60);

            dayElement.textContent = pad(days);
            hourElement.textContent = pad(hours);
            minuteElement.textContent = pad(minutes);
            secondElement.textContent = pad(seconds);
        }

        updateCountdown();
        setInterval(updateCountdown, 1000);
    </script>
</body>
</html>
